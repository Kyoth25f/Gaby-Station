- type: entity
  parent: BasePDA
  id: AdminAssistantPDA
  name: administrative assistant PDA
  description: Theres pen scribbles all over the edges, and a few sticky notes stuck on it.
  components:
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-admin-assistant
  - type: Pda
    id: AdminAssistantIDCard
    penSlot:
      startingItem: LuxuryPen
      priority: -1
      whitelist:
        tags:
        - Write
  - type: Icon
    sprite: _Gabystation/Objects/Devices/pda.rsi
    state: pda-admin-assistant
  - type: Sprite
    sprite: _Gabystation/Objects/Devices/pda.rsi
    state: pda-admin-assistant
  - type: PdaBorderColor
    borderColor: "#3c94c5"

# Security

- type: entity
  parent: SecurityPDA
  id: PrisonGuardPDA
  name: prison guard PDA
  description: Red to hide the stains of prisoner blood.
  components:
  - type: Pda
    id: PrisonGuardIDCard
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-prisonguard
  - type: PdaBorderColor
    borderColor: "#A32D26"
    accentVColor: "#d76b00"
  - type: Icon
    sprite: _Gabystation/Objects/Devices/pda.rsi
    state: pda-prisonguard
  - type: Sprite
    sprite: _Gabystation/Objects/Devices/pda.rsi
    state: pda-prisonguard
