- type: body
  id: ADTGeras
  name: "slimes"
  root: chest
  slots:
    chest:
      part: ChestSlime
      connections:
      - groin
      organs:
        lungs: OrganSlimeLungs
    groin:
      part: GroinSlime
      organs:
        core: SentientSlimeCore
      connections:
      - legs
    legs:
      part: ADTLegsGeras
      connections:
      - feet
    feet:
      part: ADTFeetGeras
