- type: entity
  name: MX3R
  parent: BaseWeaponPistol
  id: WeaponPistolMX3R
  description: Special pistol designed for supersoldiers. Uses .35 auto ammo.
  components:
    - type: Sprite
      sprite: _Andromeda/Objects/Weapons/Guns/Pistol/mx3r.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-0
          map: ["enum.GunVisualLayers.Mag"]
    - type: Clothing
      sprite: _Andromeda/Objects/Weapons/Guns/Pistol/mx3r.rsi
    - type: Gun
      fireRate: 6
      burstFireRate: 12
      shotsPerBurst: 3
      availableModes:
        - SemiAuto
        - Burst
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
    - type: EmitSoundOnDrop
      sound: /Audio/Weapons/Guns/Gunshots/mk58.ogg
    

- type: entity
  name: MX3R (empty)
  parent: WeaponPistolMX3R
  id: WeaponPistolMX3REmpty
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
