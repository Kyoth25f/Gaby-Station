- type: entity
  name: MA56XF
  parent: BaseWeaponRifle
  id: WeaponRifleMA56XF
  description: An advanced military-grade assault rifle. Uses .30 rifle ammo.
  components:
    - type: Sprite
      sprite: _Andromeda/Objects/Weapons/Guns/Rifles/ma56xf.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-0
          map: ["enum.GunVisualLayers.Mag"]
    - type: Clothing
      sprite: _Andromeda/Objects/Weapons/Guns/Rifles/ma56xf.rsi
    - type: Gun
      fireRate: 5.0
      burstFireRate: 15
      shotsPerBurst: 4
      burstCooldown: 0.60
      availableModes:
        - SemiAuto
        - Burst
        - FullAuto
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/ltrifle.ogg
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: MagazineLightRifle
          insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
          priority: 2
          whitelist:
            tags:
              - MagazineLightRifle #.30
          whitelistFailPopup: gun-magazine-whitelist-fail
        gun_chamber:
          name: Chamber
          startingItem: CartridgeLightRifle
          priority: 1
          whitelist:
            tags:
              - CartridgeLightRifle #.30
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot
        gun_chamber: !type:ContainerSlot
    - type: MagazineVisuals
      magState: mag
      steps: 1
      zeroVisible: true
    - type: Appearance
