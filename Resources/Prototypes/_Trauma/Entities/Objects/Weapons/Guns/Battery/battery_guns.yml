- type: entity
  name: phaser
  parent: [BaseWeaponBatterySmall, BaseSecurityContraband]
  id: WeaponEnergyGunPhaser
  description: The Type 5 Heat Delivery System, Compact Variant, developed by Nanotrasen. The workhorse of Nanotrasen's security forces, but in a more portable size. Sacrifices some stopping power and capacity for ease of carry and faster charging. Can be set to disable for wrangling criminals, and lethal for when the going gets tough.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Guns/Battery/phaser.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mode
      shader: unshaded
      color: "#00B2FF"
      map: [ "Firemode" ]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    quickEquip: false
    slots:
    - suitStorage
    - belt
    sprite: _Trauma/Objects/Weapons/Guns/Battery/phaser.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/laser.ogg
    soundEmpty:
      path: /Audio/_DV/Weapons/Guns/Empty/dry_fire.ogg
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: ProjectileBatteryAmmoProvider
    proto: BulletDisabler
    fireCost: 50
  - type: AmmoSelector
    prototypes:
      - BulletDisabler
      - BulletEnergyGunLaserPhaser
  - type: UserInterface
    interfaces:
      enum.AmmoSelectorUiKey.Key:
        type: AmmoSelectorMenuBoundUserInterface
  - type: ActivatableUI
    inHandsOnly: true
    key: enum.AmmoSelectorUiKey.Key
  - type: ItemToggle
    activated: true
    onActivate: false
    onUse: false
    wieldToggle: false
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: ItemToggleColor
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: Firemode
    inhandVisuals:
      left:
      - state: mode-inhand-left
        shader: unshaded
      right:
      - state: mode-inhand-right
        shader: unshaded
  - type: Tag
    tags:
    - Sidearm
  - type: StaticPrice
    price: 150
  - type: Multishot
