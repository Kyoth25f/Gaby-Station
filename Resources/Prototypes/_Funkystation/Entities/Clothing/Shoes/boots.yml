# Forsaken Boots (Blood Cult themed no-slip boots)

- type: entity
  parent: [ClothingShoesBaseButcherable, BaseMinorContraband]
  id: ClothingShoesBootsForsaken
  name: forsaken boots
  description: Cursed boots that grip the ground with an unnatural tenacity. The blood cult's dark magic ensures you'll never slip.
  components:
  - type: Sprite
    sprite: _Funkystation/BloodCult/Clothing/cult_boots.rsi
  - type: Clothing
    sprite: _Funkystation/BloodCult/Clothing/cult_boots.rsi
#  - type: NoSlip
  - type: SlowedOverSlippery
    slowdownModifier: 0.7
  - type: SpeedModifierContactCapClothing
    maxContactSprintSlowdown: 0.7
    maxContactWalkSlowdown: 0.7
