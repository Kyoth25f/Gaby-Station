- type: entity
  parent: [ CrateWeaponSecure, BaseSecurityContraband ]
  id: CrateGygaxBoards
  name: Gygax circuit boards crate
  description: A crate containing the circuits required to build a Gygax mech. (But not anything else.)
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: GygaxPeripheralsElectronics
        - id: GygaxTargetingElectronics
        - id: GygaxCentralElectronics

- type: entity
