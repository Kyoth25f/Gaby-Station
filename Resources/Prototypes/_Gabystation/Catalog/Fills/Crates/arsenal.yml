  id: CrateDurandBoards
  name: Durand circuit boards crate
  description: A crate containing the circuits required to build a Durand mech. (But not anything else.)
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: DurandPeripheralsElectronics
        - id: DurandTargetingElectronics
        - id: DurandCentralElectronics
