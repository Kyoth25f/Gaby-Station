# Midround Morph - Trauma Port
- type: entity
  parent: BaseGameRule
  id: MorphRule
  components:
  - type: StationEvent
    earliestStart: 20
    weight: 3
    minimumPlayers: 20
    duration: null
    occursDuringRoundEnd: false
  - type: MorphRule
  - type: AntagRandomSpawn
  - type: AntagSpawner
    prototype: MobMorph
  - type: AntagSelection
    selectionTime: PostPlayerSpawn
    agentName: morph-round-end-name
    definitions:
    - spawnerPrototype: GhostRoleSpawnerMorph
      min: 1
      max: 1
      briefing:
        text: morph-role-greeting
        color: lime
        sound: /Audio/_Gabystation/Misc/Morph/mutate.ogg
      mindRoles:
      - MindRoleMorph
  - type: GameRule
    chaosScore: 200 # dumont edit maybe it'll actually be spawned now

