- type: entity
  id: ThrusterHuge
  name: huge thruster
  parent: BaseThruster
  placement:
    mode: SnapgridCenter
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 4000
      behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 2000
      behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.45,-1.45,1.45,1.25"
        density: 4000
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: ApcPowerReceiver
    powerLoad: 20000
  - type: Thruster
    thrust: 3600
    burnShape: ["-1.15,1.2875","-0.75,3.0875","0.75,3.0875","1.15,1.2875"]
    damage:
      types:
        Heat: 200
  - type: Sprite
    sprite: _Gabystation/Structures/thruster_huge.rsi
    layers:
    - state: base
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
      offset: 0, 2.78
  - type: Anchorable
    flags: None
  - type: StaticPrice
    price: 3000
